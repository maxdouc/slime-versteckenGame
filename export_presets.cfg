; Web (HTML5) export preset — Slime-Verstecken.
; NOTE: exporting also requires the Godot 4.7 EXPORT TEMPLATES installed in the
; editor (Editor > Manage Export Templates). Threads are ON, so the host serving
; the build must send COOP/COEP headers (SharedArrayBuffer). itch.io does this;
; GitHub Pages does not — host the playable build on itch.io.

[preset.0]

name="Web"
platform="Web"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="export/web/index.html"

[preset.0.options]

variant/extensions_support=false
variant/thread_support=true
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
progressive_web_app/enabled=false
